name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all

      - name: Run tests
        run: cargo test --all

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Codegen containment guard
        run: |
          violations=$(grep -rlE '^\s*use\s+inkwell|\b(LLVMValue|LLVMType|BasicValueEnum|BasicTypeEnum)\b' src/ | grep -vE '^src/codegen(\.rs$|/)' || true)
          if [ -n "$violations" ]; then
            echo "::error::Codegen containment violation — LLVM/inkwell references outside src/codegen.{rs,/}:"
            echo "$violations"
            echo "See docs/design.md § Codegen architecture and CLAUDE.md § Architecture > Codegen containment."
            exit 1
          fi

  # Clippy for the `#[cfg(windows)]` runtime surface the native `lint` job
  # (ubuntu-only) structurally cannot see. The Windows IOCP event-loop, TLS,
  # and fatal-path bodies (`runtime/src/{event_loop,tls,fatal}.rs` — the
  # Windows IOCP port, docs/spikes/windows-iocp-eventloop.md) are gated behind
  # `#[cfg(windows)]`, so `cargo clippy` on a Linux runner never type-checks —
  # let alone lints — them. They were authored and fixed natively on a Windows
  # box, where 6 pre-existing `missing_safety_doc` lints on the WS FFIs only
  # surfaced; this job keeps that surface green going forward (mirrors the
  # per-target `wasm` clippy job's rationale). Scope: the runtime crate with
  # its full native feature set (`tls,net` + `test-helpers` for the test-only
  # FFI's Windows body) — the exact set validated clean on the box. The
  # `#[cfg(windows)]` codegen linker driver (`src/codegen/driver.rs`) is
  # `--features llvm`-gated and stays uncovered until the broader "LLVM in CI"
  # decision puts LLVM 18 on the Windows runner (the documented yak-shave the
  # spike defers — same reason the codegen E2E jobs are Linux-only). That
  # uncovered surface now also includes the producer-mode library link arms
  # (`link_static_library` / `link_shared_library` Windows branches +
  # `NativeLibKind::artifact_extension`, additive-interop Tier 5): `.lib`/`.dll`
  # emission via `llvm-ar` / `clang -shared` with a `/EXPORT:`-per-symbol list.
  # They mirror this file's proven `link_executable_windows` toolchain
  # conventions; a Windows `codegen-lint` job (clippy `--features llvm` on
  # windows-latest, mirroring the Linux `codegen-lint` below) is the intended
  # first coverage step once LLVM 18 lands on the Windows runner.
  windows-lint:
    name: Windows clippy (cfg(windows) surface)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-lint

      - name: Clippy (cfg(windows) runtime surface)
        run: cargo clippy -p karac-runtime --all-targets --features tls,net,test-helpers -- -D warnings

  # Wasm runtime surface that the native `lint` / `test` jobs never see
  # (B-2026-06-12-2). `cargo clippy --all` runs on the host target only, so a
  # wasm-cfg'd lint — e.g. the `clashing_extern_declarations` malloc clash that
  # drifted red unnoticed (B-2026-06-11-9) — is invisible to it; and the
  # default build job never exercises the no-default-features wasm archives, so
  # a wasm-only break (a non-wasm dep creeping into the default set, a cfg typo)
  # slips through. This job gates both wasm clippy arms and both wasm staticlib
  # archive builds (the CLAUDE.md § "Four archives" wasm legs). It needs neither
  # LLVM nor node — the `--features llvm` wasm E2E run (which would also catch
  # the codegen-side size_t-width trap class, B-2026-06-12-1) is gated on the
  # broader "LLVM in CI" decision that keeps all codegen E2E out of CI today.
  wasm:
    name: WASM (clippy + archives)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1, wasm32-wasip1-threads
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      # The sequential (net-free) archive's clippy surface. `-D warnings` is
      # the gate the local CLAUDE.md recipe assumes but CI never ran.
      - name: Clippy (wasm32-wasip1)
        run: cargo clippy -p karac-runtime --target wasm32-wasip1 --no-default-features -- -D warnings

      # The threaded sibling (wasi-threads ABI; its sysroot is the only one
      # whose wasi-libc carries atomics). Separate cfg surface, separate lint.
      - name: Clippy (wasm32-wasip1-threads)
        run: cargo clippy -p karac-runtime --target wasm32-wasip1-threads --no-default-features --features wasm-threads -- -D warnings

      # The two wasm staticlib legs of the four-archive recipe — proves they
      # still build (a warn-level extern clash links but a real cfg/dep break
      # would fail here, where the native build job can't see it).
      - name: Build wasm staticlib archives
        run: |
          cargo rustc -p karac-runtime --release --target wasm32-wasip1 --no-default-features --crate-type staticlib
          cargo rustc -p karac-runtime --release --target wasm32-wasip1-threads --no-default-features --features wasm-threads --crate-type staticlib

  # The `--features llvm` codegen surface — the load-bearing correctness gate
  # that, until now, ran ZERO times in CI (`test` runs `cargo test --all`, no
  # `--features llvm`, so the real-binary codegen E2E + the self-hosting oracle
  # were never gated; two wasm bugs drifted in through exactly this hole). Tier 1
  # scope: the deterministic, dependency-light binaries — codegen E2E,
  # interpreter, typechecker, and the differential self-host lexer oracle. The
  # archives must exist or the E2E binaries vacuously skip, so build the native
  # lean→full pair first (codegen links them). Deliberately NOT here yet:
  # memory_sanitizer (needs an ASAN cc — Tier 2) and the wasm/component E2E
  # (needs node + wasm-tools + the wasm archives — Tier 3, B-2026-06-12-2 leg 3).
  # Provenance guard: the self-hosted-lexer oracle (tests/selfhost_lexer.rs) is
  # a DIFFERENTIAL oracle — it only catches port drift on behaviour its corpus
  # exercises. A seed change to src/lexer.rs with no matching corpus input lets
  # the Kāra port silently diverge while the oracle stays green (how commits
  # 3311df6d / 99131a7b drifted — fixed in follow-on #31). This job fails when
  # src/lexer.rs changes without tests/selfhost_lexer.rs over the push/PR range,
  # so the seed and the oracle corpus are forced to move together. Escape
  # hatches (whitespace/format-only diff, or a [skip-oracle-sync] commit marker)
  # let genuinely oracle-irrelevant lexer edits through — see the script header.
  oracle-sync:
    name: Oracle corpus sync guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # The guard diffs across the push/PR range, so it needs full history,
          # not the default depth-1 shallow clone (a shallow clone has no
          # merge-base to compare against).
          fetch-depth: 0

      - name: Enforce seed↔oracle corpus sync
        # On a PR, compare the PR base branch tip against the head SHA; on a
        # push, compare the push's before..after. The script merge-bases the two
        # internally and applies the escape hatches.
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/oracle-sync-guard.sh

  # The `--features llvm` clippy surface — the ENTIRE codegen backend
  # (`src/codegen.rs` + every `src/codegen/*.rs`, the largest and most
  # actively-developed part of the compiler) is gated behind
  # `#[cfg(feature = "llvm")]`, so the native `lint` job's
  # `cargo clippy --all -- -D warnings` (no `--features llvm`) never compiles —
  # let alone lints — a single line of it. That hole let a `doc_lazy_continuation`
  # lint sit undetected in `src/codegen/column.rs` (a wrapped `//!` doc line
  # whose continuation read as a markdown bullet) until a local
  # `cargo clippy --all --all-targets --features llvm` run caught it. This job
  # closes the gap with the SAME LLVM-18.1 install as `codegen-e2e` below
  # (inkwell → llvm-sys needs `llvm-config-18` + libLLVM-18.so), plus the
  # `clippy` component the bare `codegen-e2e` job omits. `--all-targets` keeps
  # the `#[cfg(feature = "llvm")]` test targets (`tests/codegen.rs`,
  # `tests/par_codegen.rs`, `tests/memory_sanitizer.rs`) under the gate too —
  # see CLAUDE.md § "Use `--all-targets`, not `--tests`". No runtime staticlib
  # archives are needed here: clippy type-checks but never links or runs a
  # binary, so the lean→full archive dance the E2E jobs do is unnecessary.
  # This is the codegen sibling of the per-target `wasm` and `windows-lint`
  # clippy jobs — each gates a cfg surface the ubuntu-native `lint` can't see.
  codegen-lint:
    name: Codegen clippy (LLVM 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Mirror codegen-e2e's LLVM-18.1 setup. clippy is a check build (no final
      # link), so libLLVM-18.so isn't strictly loaded, but llvm-sys's build
      # script invokes `llvm-config-18`; install `llvm-18-dev` and export the
      # prefix it queries. LD_LIBRARY_PATH is kept for parity with the E2E jobs.
      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev
          echo "LLVM_SYS_181_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(llvm-config-18 --libdir)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-clippy

      - name: Clippy (--features llvm codegen backend)
        run: cargo clippy --all --all-targets --features llvm -- -D warnings

  codegen-e2e:
    name: Codegen E2E (LLVM 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # inkwell `llvm18-1-prefer-dynamic` + llvm-sys `181` → LLVM 18.1, linked
      # dynamically (libLLVM-18.so must be present at build AND run time).
      # ubuntu-latest ships LLVM 18.1 in apt — more deterministic than the
      # install-action's prebuilt layout, whose tree the llvm-sys build script
      # couldn't find `llvm-config` in. `llvm-18-dev` provides `llvm-config-18`
      # + `libLLVM-18.so` + headers; export the prefix llvm-sys queries and the
      # libdir the test binaries load the shared lib from (both job-wide via
      # GITHUB_ENV).
      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev
          echo "LLVM_SYS_181_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(llvm-config-18 --libdir)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-e2e

      # Real-binary E2E + the self-host oracle build via `karac build` and link
      # the runtime staticlib; without it they skip (vacuous pass). Lean first,
      # copied to the `_min` sibling, THEN full overwrites the canonical name —
      # the order matters (CLAUDE.md § "Four archives").
      - name: Build runtime staticlib archives (lean → full)
        run: |
          cargo rustc -p karac-runtime --release --no-default-features --features net --crate-type staticlib
          cp target/release/libkarac_runtime.a target/release/libkarac_runtime_min.a
          cargo rustc -p karac-runtime --release --crate-type staticlib

      - name: Codegen E2E + interpreter + typechecker + self-host oracle
        run: cargo test --features llvm --lib --test codegen --test interpreter --test typechecker --test selfhost_lexer

      # AArch64 `#[repr(C)]` struct-by-value ABI signature match (B-2026-07-09-2).
      # Forces the arm64 target-ABI classifier via KARAC_FORCE_TARGET_ARCH and
      # asserts the emitted LLVM param signatures equal clang's arm64 coercions
      # (`[2 x i64]`, `[N x double]`, `i64`, …). Identical IR lowers identically,
      # so a signature match IS an ABI match — this catches a coercion regression
      # HERE, on Linux/x86-64, without arm64 hardware; the codegen-e2e-macos job
      # is the paired real-execution confirmation.
      - name: AArch64 repr(C) struct ABI signature match (forced arch)
        run: cargo test --features llvm --test abi_repr_c_struct
        env:
          KARAC_FORCE_TARGET_ARCH: aarch64

      # Windows x64 `#[repr(C)]` struct-by-value ABI signature match
      # (B-2026-07-09-8). Same trick as the arm64 leg above — force the target
      # classifier via KARAC_FORCE_TARGET_ARCH and diff the emitted LLVM
      # signatures against the Microsoft x64 rules (1/2/4/8-byte aggregates
      # coerce to `iN`; every other size passes as a plain `ptr` — no `byval`
      # — and returns via `sret`). Runs on the Linux runner so a regression
      # trips *before* the flakier `codegen-e2e-windows` job (Stage 4) has to;
      # that job is the paired real-execution confirmation on native Windows.
      - name: Windows x64 repr(C) struct ABI signature match (forced arch)
        run: cargo test --features llvm --test abi_repr_c_struct
        env:
          KARAC_FORCE_TARGET_ARCH: windows_x86_64

      # LLJIT-productionization Slice 1 follow-up: re-run the codegen E2E suite
      # through the JIT execution lane (not just AOT). `KARAC_TEST_JIT=1` routes
      # `tests/codegen.rs`'s runner to a `karac_jit_runner` subprocess (which
      # cargo built above via `CARGO_BIN_EXE_karac_jit_runner`, feature-gated on
      # `llvm`), so this leg exercises the in-process LLJIT engine + the ELF
      # `.dynsym` runtime-symbol export end-to-end. Until Slice 1 folded the JIT
      # into `llvm`, this lane had ZERO CI coverage — exactly what let the
      # whole-lane Linux breakage (B-2026-07-07-5) sit undetected. The AOT step
      # above is the oracle; this asserts run==build parity across all 2084
      # cases. The same compiled test binary reruns (the env var is read at
      # test-runtime), so this adds run time, not build time.
      - name: Codegen E2E via LLJIT (run==build parity)
        run: cargo test --features llvm --test codegen
        env:
          KARAC_TEST_JIT: "1"

  # The `--features llvm` codegen + producer-mode E2E on **Apple silicon
  # (arm64)** — the one non-x86_64, non-Linux leg that runs real binaries, so
  # it is the first step of the additive-interop "4-target CI matrix" (roadmap
  # Tier 5). It closes the standing "AArch64/Apple ABI unverified" caveat on
  # the `#[repr(C)]` enum slices (repr-c-tagged-union-enums.md): the all-unit
  # `int64_t` mapping and the scalar-payload tagged-union box both rest on the
  # SysV "one-eightbyte struct in one register" rule holding on AArch64 too —
  # this job is where that stops being an assumption. `macos-latest` IS arm64,
  # so no emulation. LLVM 18 comes from Homebrew's `llvm@18` (18.1.x, what
  # llvm-sys `181` wants); the dylib is found at test-runtime via
  # DYLD_FALLBACK_LIBRARY_PATH (SIP strips DYLD_LIBRARY_PATH from spawned
  # children, the fallback var survives). `cc` is clang, already present.
  #
  # Scope is the ABI-bearing subset, not the whole suite: the codegen E2E
  # oracle (general arm64 codegen/ABI: enum-payload word encoding, boxing,
  # struct returns) + the producer-mode cli tests (library artifacts + the
  # repr(C)-enum round-trips). NOT the JIT lane (a Linux-regression guard,
  # B-2026-07-07-5) and NOT the network/wasm cli tests (extra tooling).
  #
  # NON-REQUIRED until it has a green streak (mirrors `memory-sanitizer`): add
  # to branch protection only once stable, so a first-run macOS-toolchain
  # hiccup can't block the required gates.
  codegen-e2e-macos:
    name: Codegen E2E (macOS arm64, LLVM 18)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 (Homebrew)
        run: |
          brew install llvm@18
          PREFIX="$(brew --prefix llvm@18)"
          echo "LLVM_SYS_181_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$PREFIX/lib" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-e2e-macos

      # Same lean→full archive dance as the Linux `codegen-e2e` job — the
      # real-binary E2E links these (without them the tests skip vacuously).
      - name: Build runtime staticlib archives (lean → full)
        run: |
          cargo rustc -p karac-runtime --release --no-default-features --features net --crate-type staticlib
          cp target/release/libkarac_runtime.a target/release/libkarac_runtime_min.a
          cargo rustc -p karac-runtime --release --crate-type staticlib

      # Broad arm64 codegen/ABI oracle.
      - name: Codegen E2E (arm64)
        run: cargo test --features llvm --test codegen

      # The producer-mode library + `#[repr(C)]` enum + struct-by-value
      # round-trips — the direct AArch64 confirmation for the artifact + ABI
      # work. Multiple filters are OR'd by libtest. `test_build_crate_type`
      # (the `stats_mean(Stats{ f64, i64 })` struct-by-value case) is the
      # real-execution proof of the B-2026-07-09-2 fix: it was quarantined when
      # this job first caught the arm64 struct-ABI mislowering, and is re-added
      # now that codegen coerces `#[repr(C)]` struct params per AAPCS. If it
      # regresses, the fix broke on real arm64 hardware.
      - name: Producer-mode E2E (library artifacts + repr(C) enums + structs, arm64)
        run: >
          cargo test --features llvm --test cli --
          test_build_repr_c_enum
          test_build_repr_c_struct
          test_build_crate_type
          test_build_auto_boxed
          test_project_lib_table

  # 4-target matrix STAGE 2 — Linux AArch64 (native `ubuntu-*-arm` runner, GA +
  # free for public repos). The SECOND arm64 execution leg: it runs the same
  # real binaries as `codegen-e2e-macos` but under the Linux AAPCS64 (vs Apple's
  # arm64 ABI), so it independently confirms the `#[repr(C)]` struct-by-value
  # coercion (B-2026-07-09-2) and would catch any Apple-vs-Linux ABI divergence
  # in it. Native arm64, so the real target classifier fires (no forced arch)
  # and the producer struct tests exercise it by execution. Same apt LLVM-18 +
  # lean→full archive setup as the x86-64 `codegen-e2e` job — just a different
  # `runs-on`. NON-REQUIRED until it has a green streak (mirrors the other
  # matrix legs).
  codegen-e2e-linux-arm64:
    name: Codegen E2E (Linux arm64, LLVM 18)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev
          echo "LLVM_SYS_181_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(llvm-config-18 --libdir)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-e2e-linux-arm64

      - name: Build runtime staticlib archives (lean → full)
        run: |
          cargo rustc -p karac-runtime --release --no-default-features --features net --crate-type staticlib
          cp target/release/libkarac_runtime.a target/release/libkarac_runtime_min.a
          cargo rustc -p karac-runtime --release --crate-type staticlib

      - name: Codegen E2E (arm64)
        run: cargo test --features llvm --test codegen

      - name: Producer-mode E2E (library artifacts + repr(C) enums + structs, arm64)
        run: >
          cargo test --features llvm --test cli --
          test_build_repr_c_enum
          test_build_repr_c_struct
          test_build_crate_type
          test_build_auto_boxed
          test_project_lib_table

  # 4-target matrix STAGE 4 — Windows x86-64 (native `windows-latest`). The
  # producer path emits Windows-native artifacts (`.lib` / `.dll` + import lib
  # via `llvm-ar` / `clang -shared` with a `/EXPORT:`-per-symbol list, cfg(windows)
  # in `src/codegen/driver.rs`), and the Microsoft x64 aggregate ABI classifier
  # (B-2026-07-09-8) lives in codegen with no Linux CI coverage — this leg is
  # the paired real-execution confirmation, closing the "Windows producer
  # unverified" caveat that the roadmap Tier-5 entry has carried. LLVM 18 comes
  # from Chocolatey (`llvm --version=18.1.8`, MSVC-linkable prebuilt);
  # `LLVM_SYS_181_PREFIX` points at its install root so `llvm-sys 181` finds
  # `llvm-config.exe`, and the DLL lives under `bin/` which Chocolatey adds to
  # PATH. `dtolnay/rust-toolchain@stable` defaults to
  # `stable-x86_64-pc-windows-msvc` on windows-latest, so the runtime staticlib
  # emits `karac_runtime.lib` (MSVC naming — see `resolve_runtime_path`
  # cfg(windows) branch), not the unix `libkarac_runtime.a`. NON-REQUIRED until
  # it has a green streak (mirrors the other matrix legs).
  #
  # Scope mirrors the Linux arm64 leg: the codegen E2E oracle + the producer
  # library-artifact + `#[repr(C)]` enum/struct round-trips. The B-2026-07-09-8
  # Microsoft x64 struct-by-value coercion is proven both by the signature-match
  # tests (any host with `KARAC_FORCE_TARGET_ARCH=windows_x86_64`, run below —
  # identical IR ⇒ identical ABI) AND by a real execution: the `test_build_repr_c_struct`
  # producer test builds a `.lib`, links it from a C host (clang), and reads back
  # struct-by-value round-trip data. If the classifier regresses, this test flips.
  codegen-e2e-windows:
    name: Codegen E2E (Windows x86-64, LLVM 18)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Install LLVM 18.1 via `KyleMayes/install-llvm-action` — the standard
      # GH-Actions LLVM installer. `directory` is load-bearing on Windows:
      # without it, the action extracts to `C:\Program Files\LLVM`, which
      # is where the runner's preinstalled LLVM 20 already lives; the two
      # trees merge and `llvm-config` reports the wrong version, tripping
      # llvm-sys 181's version probe ("No suitable version of LLVM was
      # found system-wide or pointed to by LLVM_SYS_181_PREFIX"). Pinning
      # to `$RUNNER_TEMP/llvm` guarantees a clean extract with no overlap.
      # The follow-up step pins `LLVM_SYS_181_PREFIX` at the extracted
      # prefix so llvm-sys picks up 18.1's `llvm-config`, and adds `bin/`
      # to PATH for the runtime `libLLVM-18.dll` load at test time.
      - name: Install LLVM 18
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1.8"
          directory: ${{ runner.temp }}/llvm

      - name: Point llvm-sys 181 at the installed LLVM
        shell: pwsh
        run: |
          echo "LLVM_SYS_181_PREFIX=$env:LLVM_PATH" >> $env:GITHUB_ENV
          echo "$env:LLVM_PATH\bin" >> $env:GITHUB_PATH

      # Diagnostic: llvm-sys 181's build script probes `<PREFIX>/bin/llvm-config[.exe]`
      # for a version match; the official LLVM Windows NSIS installer has
      # historically omitted `llvm-config.exe`, and if that's what's tripping
      # the "No suitable version of LLVM was found" error, this will show it.
      - name: Probe extracted LLVM tree
        shell: pwsh
        run: |
          Write-Host "== LLVM_PATH = $env:LLVM_PATH =="
          Write-Host "== Root =="
          Get-ChildItem $env:LLVM_PATH | Select-Object -ExpandProperty Name
          Write-Host "== bin\ =="
          Get-ChildItem "$env:LLVM_PATH\bin" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "llvm|clang" } | Select-Object -First 20 -ExpandProperty Name
          Write-Host "== llvm-config* anywhere =="
          Get-ChildItem $env:LLVM_PATH -Recurse -Filter "llvm-config*" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-e2e-windows

      # Same lean→full archive dance as the other codegen-e2e legs. On Windows
      # MSVC the artifact is `karac_runtime.lib` (see `resolve_runtime_path`
      # cfg(windows)); the lean sibling name is `karac_runtime_min.lib`. Uses
      # `bash` so the `cp` invocation matches the Linux legs verbatim (Git for
      # Windows' bash is bundled on windows-latest runners).
      - name: Build runtime staticlib archives (lean → full)
        shell: bash
        run: |
          cargo rustc -p karac-runtime --release --no-default-features --features net --crate-type staticlib
          cp target/release/karac_runtime.lib target/release/karac_runtime_min.lib
          cargo rustc -p karac-runtime --release --crate-type staticlib

      - name: Codegen E2E (Windows x86-64)
        run: cargo test --features llvm --test codegen

      # Windows x64 `#[repr(C)]` struct-by-value ABI signature match
      # (B-2026-07-09-8). Runs natively (no env forcing needed — the
      # Windows x86-64 host trips `win_x64_active()` directly), asserts the
      # emitted LLVM signatures match the Microsoft x64 rules: 1/2/4/8-byte
      # aggregates coerce to `iN`; every other size passes as a plain `ptr`
      # (NO `byval`) and returns via `sret`. Paired with the execution proof
      # in the producer-mode step below.
      - name: Windows x64 repr(C) struct ABI signature match
        run: cargo test --features llvm --test abi_repr_c_struct

      # The producer library-artifact + `#[repr(C)]` enum + struct-by-value
      # round-trips — the direct execution confirmation for the artifact + ABI
      # work on Windows. If the B-2026-07-09-8 classifier regresses, the
      # struct-by-value case flips (a C host reads back wrong data / crashes).
      - name: Producer-mode E2E (library artifacts + repr(C) enums + structs, Windows x64)
        run: >
          cargo test --features llvm --test cli --
          test_build_repr_c_enum
          test_build_repr_c_struct
          test_build_crate_type
          test_build_auto_boxed
          test_project_lib_table

  # (The former STAGE 3 leg — Codegen E2E on macOS x86_64, Intel `macos-13` —
  # was dropped 2026-07-09. It only covered the intersection of two things the
  # matrix already tests — x86-64 codegen+execution (the `codegen-e2e` job on
  # ubuntu-latest, ELF/SysV) and the macOS producer link path (`codegen-e2e-macos`
  # on arm64, Mach-O) — so it added no unique coverage, and the scarce `macos-13`
  # Intel runners left it queued for 1h+ without allocating. The matrix is now
  # Linux x86-64, Linux arm64, macOS arm64, Windows x86-64 — Stage 4 above closes
  # what was previously "the Windows build/clippy jobs" gap.)

  # Tier 2 of the CI test-coverage tiers (docs/spikes/ci-test-coverage.md): the
  # `--features llvm` memory-sanitizer suite — ASAN catches use-after-free /
  # double-free, and on Linux `-fsanitize=address` ALSO runs LeakSanitizer,
  # which is unsupported on macOS — so this leg adds leak coverage the local
  # mac runs structurally cannot. Same LLVM-18 + native-archive setup as
  # `codegen-e2e`; the test self-skips if the runner has no ASAN-capable `cc`
  # (ubuntu-latest's gcc does). Deliberately a SEPARATE, NON-required job
  # (not in branch protection) until it has a green streak — if a Linux-only
  # leak surfaces (the whole point), it shouldn't block the required gates.
  memory-sanitizer:
    name: Memory sanitizer (ASAN + LeakSanitizer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev
          echo "LLVM_SYS_181_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(llvm-config-18 --libdir)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: memsan

      - name: Build runtime staticlib archives (lean → full)
        run: |
          cargo rustc -p karac-runtime --release --no-default-features --features net --crate-type staticlib
          cp target/release/libkarac_runtime.a target/release/libkarac_runtime_min.a
          cargo rustc -p karac-runtime --release --crate-type staticlib

      - name: Memory sanitizer (UAF / double-free + Linux leaks)
        run: cargo test --features llvm --test memory_sanitizer

  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cross-compile
        run: cross build --target ${{ matrix.target }}

      # Phase-10 v64 P0 (TLS-provider cross-compile gate): `cross build`
      # above only builds the root `karac` package — its rustls dep is
      # dev-only, so the step compiles ZERO TLS code. The runtime's
      # default `tls` feature (rustls + ring, incl. ring's C objects via
      # the cross image's C toolchain) is the thing the v1 target matrix
      # must prove, so build it explicitly.
      - name: Cross-compile runtime (tls feature tree)
        run: cross build --target ${{ matrix.target }} -p karac-runtime

  # Phase-10 v64 P0 — TLS-provider cross-compile gate for the v1 targets
  # the full runtime can't reach yet (tokio/mio/hyper don't compile on
  # wasm32 / bare metal). Gates rustls + ring in isolation via the
  # `runtime/tls-cross-probe/*` workspace members; per-target feature
  # recipes live in those crates' Cargo.toml headers. Native legs are
  # covered elsewhere: linux/macos/windows by `test` (workspace default
  # `tls`), linux aarch64/armv7 by `cross` above, macOS x86_64 here.
  #
  # The cortex-m leg is a NEGATIVE gate (`expect_unsupported`): ring's
  # curve25519 ARM assembly (x25519-asm-arm.S) is ARM-mode-only and
  # cortex-m is Thumb-only, so the provider cannot assemble there — an
  # ISA limitation, not a toolchain gap (the arm-none-eabi sysroot is
  # installed and headers resolve; the .S file itself rejects -mthumb).
  # The leg asserts the failure is still exactly ring's C/asm build: it
  # FAILS LOUDLY if the probe ever starts compiling (ecosystem caught
  # up — flip to a real gate) or fails for any other reason. Decision
  # record: phase-10-targets.md § "Embedded TLS provider decision".
  tls-cross:
    name: TLS cross-compile (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: wasm32-browser
            runner: ubuntu-latest
            target: wasm32-unknown-unknown
            package: karac-tls-cross-probe
          - name: wasm32-wasi
            runner: ubuntu-latest
            target: wasm32-wasip1
            package: karac-tls-cross-probe
          - name: cortex-m
            runner: ubuntu-latest
            target: thumbv7em-none-eabihf
            package: karac-tls-cross-probe-embedded
            expect_unsupported: true
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            # Apple-silicon runner cross-checks the x86_64 slice of the
            # FULL runtime tls tree (same SDK, different arch) — no
            # probe indirection needed on this leg.
            package: karac-runtime

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ring's build.rs compiles C for the target. Ubuntu's clang handles
      # the wasm32 triples out of the box; bare-metal ARM needs the
      # arm-none-eabi toolchain for its newlib sysroot (plain clang dies
      # on `'assert.h' file not found`).
      - name: Install ARM embedded toolchain
        if: matrix.target == 'thumbv7em-none-eabihf'
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Check TLS provider for target
        if: ${{ !matrix.expect_unsupported }}
        env:
          CC_wasm32_unknown_unknown: clang
          CC_wasm32_wasip1: clang
        run: cargo check -p ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Check TLS provider is still known-unsupported (negative gate)
        if: ${{ matrix.expect_unsupported }}
        env:
          CC_thumbv7em_none_eabihf: arm-none-eabi-gcc
        run: |
          set -o pipefail
          if cargo check -p ${{ matrix.package }} --target ${{ matrix.target }} 2>&1 | tee /tmp/tls-cross.log; then
            echo "::error::${{ matrix.name }}: the TLS provider now COMPILES for ${{ matrix.target }} — the ecosystem caught up. Drop expect_unsupported to flip this leg to a real gate, and resolve the phase-10 'Embedded TLS provider decision' entry."
            exit 1
          fi
          if ! grep -q 'failed to run custom build command for `ring' /tmp/tls-cross.log; then
            echo "::error::${{ matrix.name }}: probe failed for an UNEXPECTED reason (not ring's C/asm build) — investigate; do not paper over a new failure with this negative gate."
            tail -50 /tmp/tls-cross.log
            exit 1
          fi
          echo "${{ matrix.name }}: known-unsupported, as documented — ring's ARM-mode asm (x25519-asm-arm.S) cannot assemble for the Thumb-only ${{ matrix.target }}. See phase-10 'Embedded TLS provider decision'."

  # Phase-8 line 48 (public-CA trust default). Proves the runtime's
  # `Client.get("https://...")` validates a real CA-signed peer cert
  # using the embedded `webpki-roots` bundle — without relying on a
  # system CA store. Builds the runtime's test binary inside
  # `rust:alpine` (with `ca-certificates` present so cargo can fetch
  # crates.io), then removes `ca-certificates` BEFORE running the test
  # so the OS CA store can't be the thing that's working. The test
  # (`tests::test_https_round_trip_against_public_origin`) hits
  # `https://example.com/` and asserts a successful TLS handshake +
  # any non-zero HTTP status.
  stripped-image-https:
    name: HTTPS without system CA (stripped Alpine)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run HTTPS round-trip in rust:alpine with ca-certificates removed
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            rust:alpine sh -eu -c '
              # Build deps the runtime needs (musl-dev for libc headers,
              # gcc as the C linker). rust:alpine ships ca-certificates
              # baked in — needed to fetch crates from crates.io.
              apk add --no-cache musl-dev gcc

              # Compile (no run) — cargo fetch + build still need
              # ca-certificates reachable to talk to crates.io.
              cargo test --no-run -p karac-runtime --lib --release

              # Strip the OS CA trust store BEFORE the test runs. Alpine
              # splits trust material across two packages: `ca-certificates`
              # (just the update-ca-certificates tooling) and
              # `ca-certificates-bundle` (which actually owns
              # /etc/ssl/certs/ca-certificates.crt and /etc/ssl/cert.pem).
              # Removing only `ca-certificates` leaves the bundle in place,
              # so remove both — then `rm -f` the bundle files directly as a
              # backstop, since a reverse-dep can pin `ca-certificates-bundle`
              # and block its removal. `|| true` keeps a refused apk del from
              # aborting under `sh -e`. From here the only trust anchors
              # available to TLS are whatever the runtime embeds in its
              # rustls config.
              apk del ca-certificates ca-certificates-bundle || true
              rm -f /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem
              for f in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -e "$f" ]; then
                  echo "::error::OS CA trust store still present at $f; test premise broken"
                  exit 1
                fi
              done

              # Locate the just-built test binary and run only the
              # ignored HTTPS smoke test.
              BIN=$(find target/release/deps -maxdepth 1 -type f -name "karac_runtime-*" ! -name "*.d" -perm -111 | head -1)
              if [ -z "$BIN" ]; then
                echo "::error::karac-runtime test binary not found under target/release/deps"
                exit 1
              fi
              "$BIN" --exact \
                tests::test_https_round_trip_against_public_origin \
                --include-ignored --nocapture
            '
