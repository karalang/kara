name: Compile Speed

# Phase 8.5 Track 5: cold compile-elapsed gate. PRs are gated on the
# karac/rustc RATIO per corpus workload vs bench/compile_speed/baseline.json
# (30% initial threshold — catches order-of-magnitude blowups like the
# 2026-05-12 Maranget O(N²) shape without flaking on routine work; tightens
# as data accumulates). Pushes to main re-measure and refresh the baseline
# when a ratio drifted >5%.

on:
  pull_request:
  push:
    branches: [main]
    # A baseline refresh commit must not retrigger a run of itself.
    paths-ignore:
      - 'bench/compile_speed/baseline.json'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compile-speed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Cold compile-elapsed (gate on PR, baseline on main)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Same LLVM 18.1 setup as codegen-e2e (see ci.yml for rationale);
      # hyperfine rides the same apt transaction.
      - name: Install LLVM 18 + hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev hyperfine
          echo "LLVM_SYS_181_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(llvm-config-18 --libdir)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: compile-speed

      # The bench measures the RELEASE karac (the artifact users get), which
      # links the runtime archive on every `karac build`.
      - name: Build release karac + runtime archive
        run: |
          cargo build --release --features llvm --bin karac
          cargo rustc -p karac-runtime --release --crate-type staticlib

      - name: Run bench (twin oracle + hyperfine)
        run: ./bench/compile_speed/bench.sh

      - name: Gate vs baseline
        if: github.event_name == 'pull_request'
        run: |
          cd bench/compile_speed
          set +e
          python3 compare.py --latest latest.json --baseline baseline.json --markdown gate.md
          rc=$?
          cat gate.md >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      # Sticky PR comment (same-repo PRs only — fork tokens are read-only).
      - name: PR comment
        if: >-
          always() && github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'bench/compile_speed/gate.md';
            if (!fs.existsSync(path)) return;
            const marker = '<!-- compile-speed-gate -->';
            const body = fs.readFileSync(path, 'utf8') + '\n' + marker;
            const {data: comments} = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const prev = comments.find(c => c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: prev.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body,
              });
            }

      - name: Upload measurements
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-speed-${{ github.run_id }}
          path: |
            bench/compile_speed/latest.json
            bench/compile_speed/gate.md
          if-no-files-found: ignore

      # main is a protected branch (required status checks), so the refresh
      # rides a PR from a well-known branch instead of a direct push. Drift
      # >5% is rare, so this is an occasional one-click merge, not churn.
      - name: Refresh baseline (PR on drift)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd bench/compile_speed
          python3 compare.py --latest latest.json --write-baseline baseline.json
          if git diff --quiet baseline.json; then
            echo "baseline current — no PR needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B bench/compile-speed-baseline
          git add baseline.json
          git commit -m "bench(compile-speed): refresh baseline from main run ${{ github.run_id }}"
          git push -f origin bench/compile-speed-baseline
          if ! gh pr create \
            --base main --head bench/compile-speed-baseline \
            --title "bench(compile-speed): refresh baseline" \
            --body "Automated baseline refresh from the main-leg run of commit ${{ github.sha }} — a karac/rustc ratio drifted >5% from the stored baseline. Merging keeps the compile-speed gate honest." \
            2> gh-err.txt; then
            if grep -qi "already exists" gh-err.txt; then
              echo "PR already open — the force-push updated it"
            else
              cat gh-err.txt
              echo "::warning::Could not open the baseline PR (repo setting" \
                "'Allow GitHub Actions to create and approve pull requests'" \
                "is likely disabled). The refreshed baseline is waiting on" \
                "branch bench/compile-speed-baseline."
            fi
          fi
